<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jimmy VPN</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#080810;
  --surface:#0e0e1a;
  --surface2:#141428;
  --purple:#8b5cf6;
  --purple2:#a78bfa;
  --pink:#f472b6;
  --green:#34d399;
  --red:#f87171;
  --text:#f1f1fa;
  --muted:#5a5a78;
  --border:rgba(139,92,246,0.15);
}

html,body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── Canvas background ── */
#canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* ── Layout ── */
.page{position:relative;z-index:1;padding:32px 20px 48px;max-width:420px;margin:0 auto}

/* ── Header ── */
.hdr{display:flex;align-items:center;gap:16px;margin-bottom:32px;opacity:0;animation:up .6s .05s ease forwards}
.logo{
  width:58px;height:58px;border-radius:18px;flex-shrink:0;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  display:flex;align-items:center;justify-content:center;font-size:26px;
  box-shadow:0 0 0 1px rgba(139,92,246,.3),0 8px 32px rgba(139,92,246,.4);
  position:relative;
}
.logo::after{
  content:'';position:absolute;inset:-1px;border-radius:19px;
  background:linear-gradient(135deg,rgba(139,92,246,.5),rgba(244,114,182,.3));
  z-index:-1;filter:blur(8px);
}
.hdr-info h1{font-size:22px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#fff,var(--purple2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-info p{font-size:13px;color:var(--muted);margin-top:3px}

/* ── Status pill ── */
.pill{
  display:inline-flex;align-items:center;gap:7px;
  padding:5px 12px;border-radius:100px;font-size:12px;font-weight:700;
  margin-top:7px;letter-spacing:.2px;
}
.pill-on{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--green)}
.pill-off{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:var(--red)}
.dot{width:6px;height:6px;border-radius:50%}
.dot-g{background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite}
.dot-r{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Section label ── */
.sec-label{
  font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);margin-bottom:12px;
}

/* ── Timer ── */
.timer-wrap{
  background:linear-gradient(135deg,rgba(139,92,246,.12),rgba(244,114,182,.08));
  border:1px solid var(--border);border-radius:24px;
  padding:24px 20px;margin-bottom:16px;
  opacity:0;animation:up .6s .1s ease forwards;
  position:relative;overflow:hidden;
}
.timer-wrap::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(139,92,246,.15),transparent 70%);
}
.timer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.t-cell{text-align:center}
.t-num{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:14px;padding:14px 4px;
  font-size:26px;font-weight:900;letter-spacing:-1px;
  position:relative;overflow:hidden;
  box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.t-num::before{
  content:'';position:absolute;top:50%;left:0;right:0;
  height:1px;background:rgba(255,255,255,.04);
}
.t-lbl{font-size:10px;color:var(--muted);margin-top:6px;letter-spacing:.5px;text-transform:uppercase}
.expired-txt{text-align:center;font-size:17px;font-weight:700;color:var(--red);padding:12px 0}

/* ── Cards ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:22px;padding:20px;margin-bottom:14px;
  opacity:0;
}
.card.a1{animation:up .6s .18s ease forwards}
.card.a2{animation:up .6s .26s ease forwards}
.card.a3{animation:up .6s .34s ease forwards}

/* ── Stat grid ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:16px;padding:16px 14px;
}
.stat-icon{font-size:20px;margin-bottom:8px}
.stat-val{font-size:20px;font-weight:800;letter-spacing:-.5px}
.stat-name{font-size:11px;color:var(--muted);margin-top:4px;font-weight:500}

/* ── Traffic ── */
.tr-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.tr-row:last-child{border:none;padding-bottom:0}
.tr-arrow{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0;
}
.tr-arrow-up{background:rgba(139,92,246,.15);color:var(--purple2)}
.tr-arrow-dn{background:rgba(244,114,182,.12);color:var(--pink)}
.tr-bar-wrap{flex:1;background:rgba(255,255,255,.05);border-radius:100px;height:5px;overflow:hidden}
.tr-bar{height:100%;border-radius:100px;width:0;transition:width 1.2s cubic-bezier(.34,1.2,.64,1)}
.bar-u{background:linear-gradient(90deg,var(--purple),var(--purple2))}
.bar-d{background:linear-gradient(90deg,var(--pink),#fb7185)}
.tr-val{font-size:13px;font-weight:700;min-width:58px;text-align:right;color:var(--text)}

/* ── Sub link ── */
.sub-box{
  background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.15);
  border-radius:14px;padding:14px;font-family:'SF Mono',monospace;
  font-size:11px;color:var(--muted);word-break:break-all;line-height:1.7;
  position:relative;
}
.copy-fab{
  position:absolute;top:10px;right:10px;
  width:34px;height:34px;border-radius:10px;border:none;
  background:var(--purple);color:#fff;font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 12px rgba(139,92,246,.4);
}
.copy-fab:active{transform:scale(.88)}

/* ── Buttons ── */
.btns{opacity:0;animation:up .6s .42s ease forwards}
.btn{
  width:100%;padding:17px;border-radius:18px;border:none;
  font-size:15px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  gap:10px;margin-bottom:12px;letter-spacing:-.1px;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}
.btn:active{transform:scale(.95)}
.btn-primary{
  background:linear-gradient(135deg,var(--purple) 0%,#b06aff 100%);
  color:#fff;
  box-shadow:0 0 0 1px rgba(139,92,246,.35),
             0 8px 28px rgba(139,92,246,.4),
             0 2px 0 rgba(255,255,255,.08) inset;
}
.btn-primary::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
  transition:left .5s;
}
.btn-primary:active::before{left:100%}
.btn-secondary{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  color:var(--text);
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}

/* ── Toast ── */
.toast{
  position:fixed;bottom:32px;left:50%;
  transform:translateX(-50%) translateY(120px);
  background:rgba(52,211,153,.1);backdrop-filter:blur(16px);
  border:1px solid rgba(52,211,153,.2);color:var(--green);
  padding:12px 24px;border-radius:100px;font-size:14px;font-weight:600;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;z-index:999;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── No key ── */
.nokey{text-align:center;padding:60px 20px;opacity:0;animation:up .6s ease forwards}
.nokey .icon{font-size:56px;margin-bottom:20px;display:block}
.nokey h2{font-size:22px;font-weight:800;margin-bottom:10px}
.nokey p{font-size:14px;color:var(--muted);line-height:1.7}

@keyframes up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="page">
  <div id="root"></div>
</div>

<div class="toast" id="toast">✦ Скопировано!</div>

<script>
/* ── Telegram init ── */
const tg = window.Telegram.WebApp;
tg.expand(); tg.ready();

/* ── Particle canvas ── */
(function(){
  const c = document.getElementById('canvas');
  const ctx = c.getContext('2d');
  let W, H, pts = [];
  function resize(){ W = c.width = innerWidth; H = c.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);
  function rand(a,b){ return a + Math.random()*(b-a); }
  for(let i=0;i<55;i++) pts.push({
    x:rand(0,1), y:rand(0,1),
    vx:rand(-.00015,.00015), vy:rand(-.00015,.00015),
    r:rand(.5,2), a:rand(0,1),
    purple: Math.random() > .4
  });
  function draw(){
    ctx.clearRect(0,0,W,H);
    // Draw connections
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=(pts[i].x-pts[j].x)*W, dy=(pts[i].y-pts[j].y)*H;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120){
          ctx.beginPath();
          ctx.moveTo(pts[i].x*W, pts[i].y*H);
          ctx.lineTo(pts[j].x*W, pts[j].y*H);
          ctx.strokeStyle=`rgba(139,92,246,${.08*(1-dist/120)})`;
          ctx.lineWidth=.5; ctx.stroke();
        }
      }
    }
    // Draw dots
    pts.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x*W, p.y*H, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.purple
        ? `rgba(139,92,246,${p.a*.6})`
        : `rgba(244,114,182,${p.a*.4})`;
      ctx.fill();
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>1) p.vx*=-1;
      if(p.y<0||p.y>1) p.vy*=-1;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── Params ── */
const p = new URLSearchParams(window.location.search);
const sub    = p.get('sub');
const days   = parseInt(p.get('days') ?? '-1');
const upStr  = p.get('up')   || '0 Б';
const dnStr  = p.get('down') || '0 Б';
const active = p.get('active') === '1';
const bal    = p.get('balance') || '0';
const root   = document.getElementById('root');

if (!sub) {
  root.innerHTML = `
    <div class="nokey">
      <span class="icon">🔐</span>
      <h2>Ключ не найден</h2>
      <p>Откройте бот и нажмите<br><b>👤 Личный кабинет → 📡 Подключить</b></p>
    </div>
    <div class="btns" style="opacity:1">
      <button class="btn btn-primary" onclick="tg.close()">← Вернуться в бот</button>
    </div>`;
} else {
  /* Timer HTML */
  let timerBlock = '';
  if (days < 0) {
    timerBlock = `<div class="expired-txt">⚠️ Подписка истекла</div>`;
  } else {
    timerBlock = `
      <div class="timer-grid">
        <div class="t-cell"><div class="t-num" id="tD">${String(days).padStart(2,'0')}</div><div class="t-lbl">дней</div></div>
        <div class="t-cell"><div class="t-num" id="tH">00</div><div class="t-lbl">часов</div></div>
        <div class="t-cell"><div class="t-num" id="tM">00</div><div class="t-lbl">минут</div></div>
        <div class="t-cell"><div class="t-num" id="tS">00</div><div class="t-lbl">секунд</div></div>
      </div>`;
  }

  root.innerHTML = `
    <div class="hdr">
      <div class="logo">🛡️</div>
      <div class="hdr-info">
        <h1>Jimmy VPN</h1>
        <div class="pill ${active ? 'pill-on':'pill-off'}">
          <span class="dot ${active ? 'dot-g':'dot-r'}"></span>
          ${active ? 'Подписка активна' : 'Подписка отключена'}
        </div>
      </div>
    </div>

    <div class="timer-wrap">
      <div class="sec-label">⏱ До конца подписки</div>
      ${timerBlock}
    </div>

    <div class="card a1">
      <div class="sec-label">Обзор</div>
      <div class="stat-grid">
        <div class="stat">
          <div class="stat-icon">💰</div>
          <div class="stat-val">${bal}<span style="font-size:13px;font-weight:500;color:var(--muted)"> руб.</span></div>
          <div class="stat-name">Баланс</div>
        </div>
        <div class="stat">
          <div class="stat-icon">📅</div>
          <div class="stat-val">${days >= 0 ? days : '—'}<span style="font-size:13px;font-weight:500;color:var(--muted)">${days >= 0 ? ' дн.' : ''}</span></div>
          <div class="stat-name">Осталось</div>
        </div>
      </div>
    </div>

    <div class="card a2">
      <div class="sec-label">Трафик</div>
      <div class="tr-row">
        <div class="tr-arrow tr-arrow-up">↑</div>
        <div class="tr-bar-wrap"><div class="tr-bar bar-u" id="barU"></div></div>
        <div class="tr-val">${upStr}</div>
      </div>
      <div class="tr-row">
        <div class="tr-arrow tr-arrow-dn">↓</div>
        <div class="tr-bar-wrap"><div class="tr-bar bar-d" id="barD"></div></div>
        <div class="tr-val">${dnStr}</div>
      </div>
    </div>

    <div class="card a3">
      <div class="sec-label">Ссылка подписки</div>
      <div class="sub-box">
        ${sub}
        <button class="copy-fab" onclick="copyLink()" title="Копировать">📋</button>
      </div>
    </div>

    <div class="btns">
      <button class="btn btn-primary" onclick="copyLink()">📋 Скопировать ссылку</button>
      <button class="btn btn-secondary" onclick="window.open('https://play.google.com/store/apps/details?id=com.happproxy')">📱 Скачать Happ</button>
    </div>`;

  /* Animate bars */
  setTimeout(() => {
    const u = document.getElementById('barU');
    const d = document.getElementById('barD');
    if(u) u.style.width = '62%';
    if(d) d.style.width = '41%';
  }, 700);

  /* Countdown */
  if (days >= 0) {
    let rem = days * 86400;
    const tick = () => {
      const d2 = Math.floor(rem/86400);
      const h  = Math.floor((rem%86400)/3600);
      const m  = Math.floor((rem%3600)/60);
      const s  = rem%60;
      const set = (id,v) => { const el=document.getElementById(id); if(el) el.textContent=String(v).padStart(2,'0'); };
      set('tD',d2); set('tH',h); set('tM',m); set('tS',s);
      if(rem>0){ rem--; setTimeout(tick,1000); }
    };
    tick();
  }
}

/* ── Utils ── */
function copyLink(){
  if(!sub) return;
  const ok = () => { showToast(); };
  if(navigator.clipboard){ navigator.clipboard.writeText(sub).then(ok).catch(fb); } else fb();
  function fb(){
    const el=document.createElement('textarea');
    el.value=sub; document.body.appendChild(el); el.select();
    document.execCommand('copy'); document.body.removeChild(el); ok();
  }
}
function showToast(){
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}
</script>
</body>
</html>
