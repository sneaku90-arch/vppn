<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jimmy VPN</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f; --card: #12121a; --accent: #6c63ff;
    --text: #e8e8f0; --muted: #6b6b80; --border: rgba(108,99,255,0.15);
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
  }
  body::before {
    content: ''; position: fixed; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(108,99,255,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(255,101,132,0.08) 0%, transparent 50%);
    pointer-events: none;
  }
  .container { width: 100%; max-width: 360px; position: relative; z-index: 1; }
  .logo { text-align: center; margin-bottom: 24px; }
  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #6c63ff, #ff6584);
    border-radius: 18px; display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 10px;
    box-shadow: 0 8px 32px rgba(108,99,255,0.3);
  }
  .logo h1 {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, #fff 60%, #6c63ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 18px; margin-bottom: 12px;
  }
  .card-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { font-size: 13px; color: var(--muted); }
  .info-value { font-size: 13px; font-weight: 600; }
  .green { color: #4ade80; } .red { color: #f87171; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .dot-g { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .dot-r { background: #f87171; }
  .sub-link {
    background: rgba(108,99,255,0.08); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; font-size: 11px;
    word-break: break-all; line-height: 1.5; font-family: monospace; margin-top: 8px;
  }
  .btn {
    width: 100%; padding: 15px; border-radius: 14px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-bottom: 10px; transition: all 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: linear-gradient(135deg, #6c63ff, #8b5cf6); color: #fff; box-shadow: 0 4px 20px rgba(108,99,255,0.35); }
  .btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
  .hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px; line-height: 1.5; }
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.3);
    color: #4ade80; padding: 10px 20px; border-radius: 100px;
    font-size: 13px; font-weight: 500; transition: transform 0.3s;
    white-space: nowrap; z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <h1>Jimmy VPN</h1>
  </div>
  <div id="content"></div>
</div>
<div class="toast" id="toast">✓ Скопировано!</div>
<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

const p = new URLSearchParams(window.location.search);
const sub = p.get('sub');
const days = parseInt(p.get('days')) || -1;
const up = p.get('up') || '0 Б';
const down = p.get('down') || '0 Б';
const active = p.get('active') === '1';
const balance = p.get('balance') || '0';
const content = document.getElementById('content');

if (!sub) {
  content.innerHTML = `
    <div class="card" style="text-align:center;padding:24px">
      <div style="font-size:40px;margin-bottom:12px">🔐</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">Ключ не найден</div>
      <div style="font-size:13px;color:var(--muted)">Перейдите в личный кабинет бота</div>
    </div>
    <button class="btn btn-primary" onclick="tg.close()">← Вернуться в бот</button>`;
} else {
  const expText = days < 0 ? '—' : days === 0 ? '⚠️ Сегодня' : days + ' дн.';
  content.innerHTML = `
    <div class="card">
      <div class="card-label">Статус подписки</div>
      <div class="info-row">
        <span class="info-label">Состояние</span>
        <span class="info-value ${active ? 'green' : 'red'}">
          <span class="dot ${active ? 'dot-g' : 'dot-r'}"></span>${active ? 'Активна' : 'Отключена'}
        </span>
      </div>
      <div class="info-row"><span class="info-label">Осталось</span><span class="info-value">${expText}</span></div>
      <div class="info-row"><span class="info-label">↑ Загрузка</span><span class="info-value">${up}</span></div>
      <div class="info-row"><span class="info-label">↓ Скачивание</span><span class="info-value">${down}</span></div>
      <div class="info-row"><span class="info-label">Баланс</span><span class="info-value">${balance} руб.</span></div>
    </div>
    <div class="card">
      <div class="card-label">Ссылка подписки</div>
      <div class="sub-link">${sub}</div>
    </div>
    <button class="btn btn-primary" onclick="copyLink()">📋 Скопировать ссылку</button>
    <p class="hint">Скопируйте ссылку и вставьте в Happ через кнопку +</p>
    <button class="btn btn-secondary" onclick="window.open('https://play.google.com/store/apps/details?id=com.happproxy')">📱 Скачать Happ</button>`;
}

function copyLink() {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(sub).then(showToast);
  } else {
    const el = document.createElement('textarea');
    el.value = sub; document.body.appendChild(el);
    el.select(); document.execCommand('copy');
    document.body.removeChild(el); showToast();
  }
}
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
