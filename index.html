<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jimmy VPN</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --border: rgba(108,99,255,0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Pro Display', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(108,99,255,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(255,101,132,0.08) 0%, transparent 50%);
    animation: drift 8s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes drift {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(20px, -20px) rotate(3deg); }
  }

  .container {
    width: 100%;
    max-width: 360px;
    position: relative;
    z-index: 1;
  }

  /* Logo */
  .logo {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 0.6s ease both;
  }

  .logo-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin-bottom: 12px;
    box-shadow: 0 8px 32px rgba(108,99,255,0.3);
  }

  .logo h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 60%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .sub-link {
    background: rgba(108,99,255,0.08);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--text);
    word-break: break-all;
    line-height: 1.5;
    font-family: 'SF Mono', monospace;
    position: relative;
  }

  /* Status */
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px #4ade80;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  .status span {
    font-size: 13px;
    color: #4ade80;
    font-weight: 500;
  }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
    animation: fadeUp 0.6s ease both;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: #fff;
    box-shadow: 0 4px 20px rgba(108,99,255,0.35);
    animation-delay: 0.2s;
  }

  .btn-primary:active {
    transform: scale(0.97);
    box-shadow: 0 2px 10px rgba(108,99,255,0.2);
  }

  .btn-secondary {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    animation-delay: 0.3s;
  }

  .btn-secondary:active {
    transform: scale(0.97);
  }

  .btn-copy {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    font-size: 13px;
    padding: 10px 16px;
    border-radius: 10px;
    width: 100%;
    cursor: pointer;
    transition: all 0.2s;
    animation-delay: 0.35s;
  }

  .btn-copy:active { transform: scale(0.97); }

  /* No key state */
  .no-key {
    text-align: center;
    padding: 32px 16px;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .no-key .icon { font-size: 48px; margin-bottom: 16px; }
  .no-key h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .no-key p { font-size: 14px; color: var(--muted); line-height: 1.5; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(74,222,128,0.15);
    border: 1px solid rgba(74,222,128,0.3);
    color: #4ade80;
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.3s ease;
    white-space: nowrap;
    z-index: 100;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <h1>Jimmy VPN</h1>
    <p>Быстрый и стабильный VPN</p>
  </div>

  <div id="content"></div>
</div>

<div class="toast" id="toast">✓ Скопировано!</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

// Получаем ссылку из параметров
const params = new URLSearchParams(window.location.search);
const subUrl = params.get('sub');
const content = document.getElementById('content');

if (!subUrl) {
  content.innerHTML = `
    <div class="no-key">
      <div class="icon">🔐</div>
      <h2>Ключ не найден</h2>
      <p>Перейдите в бот @Jimmy_Vpn_Bot и нажмите<br><b>👤 Личный кабинет → 📡 Подключить</b></p>
    </div>
    <button class="btn btn-primary" onclick="window.open('https://t.me/Jimmy_Vpn_Bot')">
      🤖 Открыть бот
    </button>
  `;
} else {
  content.innerHTML = `
    <div class="card">
      <div class="card-label">Ваша подписка</div>
      <div class="sub-link">${subUrl}</div>
      <div class="status">
        <div class="status-dot"></div>
        <span>Ключ активен</span>
      </div>
    </div>

    <button class="btn btn-primary" onclick="openHapp()" style="animation-delay:0.2s">
      🚀 Открыть в Happ
    </button>

    <button class="btn-copy btn" onclick="copyLink()">
      📋 Скопировать ссылку
    </button>

    <button class="btn btn-secondary" onclick="window.open('https://play.google.com/store/apps/details?id=com.happproxy')" style="animation-delay:0.3s">
      📱 Скачать Happ
    </button>
  `;
}

function openHapp() {
  const url = params.get('sub');
  const happUrl = 'happ://subscribe?url=' + encodeURIComponent(url);
  window.location.href = happUrl;
  // Если Happ не установлен — через секунду предложим скачать
  setTimeout(() => {
    const install = confirm('Happ не установлен. Скачать?');
    if (install) window.open('https://play.google.com/store/apps/details?id=com.happproxy');
  }, 1500);
}

function copyLink() {
  const url = params.get('sub');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(showToast);
  } else {
    const el = document.createElement('textarea');
    el.value = url;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast();
  }
}

function showToast() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}
</script>
</body>
</html>
